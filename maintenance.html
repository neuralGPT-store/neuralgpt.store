<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#00040D" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Mantenimiento — neuralgpt.store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      --bg: #00040D;
      --text: #e8e6e3;
      --muted: #9ca3af;
      --accent: #00eaff;
      --accent2: #7f00ff;
      --accent3: #ff0080;
      --border: rgba(255,255,255,0.12);
      --font-title: 'Orbitron', sans-serif;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      text-align: center;
    }
    .brand {
      font-family: var(--font-title);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
      margin-bottom: 32px;
      display: inline-block;
    }
    .brand span {
      color: var(--accent);
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 234, 255, 0.15), rgba(127, 0, 255, 0.15));
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    h1 {
      font-family: var(--font-title);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
      margin-bottom: 12px;
    }
    .status {
      display: inline-block;
      margin-top: 32px;
      padding: 10px 20px;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.02);
      font-size: 0.85rem;
      color: var(--accent);
      font-family: var(--font-title);
      letter-spacing: 1px;
    }
    .footer {
      margin-top: 48px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">neural<span>GPT</span>.store</div>
    <div class="icon">⚙</div>
    <h1>Volvemos pronto</h1>
    <p>Estamos realizando tareas de mantenimiento para mejorar tu experiencia.</p>
    <p>El portal inmobiliario estará disponible de nuevo en breve.</p>
    <div class="status">MANTENIMIENTO PROGRAMADO</div>
    <div class="footer">
      <p>Contacto: <a href="mailto:neuralgpt.store@protonmail.com">neuralgpt.store@protonmail.com</a></p>
      <p>&copy; 2025–2026 neuralgpt.store</p>
    </div>
  </div>
</body>
</html>
