<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>En mantenimiento — Loventy</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #F8F5F0;
      color: #2C2C2C;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .wrap {
      max-width: 480px;
      text-align: center;
    }
    .logo {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.5rem;
      color: #5E7D60;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 2rem;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 2rem;
      color: #2C2C2C;
      margin-bottom: 1rem;
    }
    p {
      color: #6B6B6B;
      line-height: 1.7;
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
    }
    .contact {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #D4CFC8;
      font-size: 0.85rem;
      color: #6B6B6B;
    }
    .contact a {
      color: #5E7D60;
    }
    .badge {
      display: inline-block;
      margin-bottom: 1.5rem;
      padding: 0.25rem 1rem;
      background: #EDE8E0;
      border: 1px solid #D4CFC8;
      border-radius: 9999px;
      font-size: 0.75rem;
      color: #6B6B6B;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="logo">Loventy</a>
    <div class="badge">Mantenimiento programado</div>
    <h1>Volvemos pronto</h1>
    <p>Estamos mejorando Loventy. Estaremos de vuelta en breve.</p>
    <p>Disculpa las molestias.</p>
    <div class="contact">
      <p>Contacto: <a href="mailto:wilfreyera@gmail.com">wilfreyera@gmail.com</a></p>
      <p style="margin-top:0.5rem">&copy; 2026 Loventy.</p>
    </div>
  </div>
</body>
</html>
