<!DOCTYPE html>
<html lang="es">
<head> <meta charset="utf-8" /> <meta name="viewport" content="width=device-width,initial-scale=1" /> <meta name="theme-color" content="#00040D" /> <title>Sin conexión — neuralgpt.store</title> <link rel="icon" href="/favicon.ico"> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #00040D 0%, #001428 100%); color: #e6f0ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; } .container { max-width: 500px; text-align: center; background: rgba(0, 20, 40, 0.6); padding: 48px 32px; border-radius: 24px; border: 1px solid rgba(0, 234, 255, 0.2); box-shadow: 0 8px 32px rgba(0, 234, 255, 0.1); } .icon { font-size: 5rem; margin-bottom: 24px; opacity: 0.8; } h1 { font-size: 1.8rem; margin-bottom: 16px; color: #00eaff; font-weight: 700; letter-spacing: 0.5px; } p { font-size: 1rem; line-height: 1.8; color: #7a8ba0; margin-bottom: 32px; } .btn { display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, #00eaff, #7f00ff); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 0.95rem; transition: all 0.3s ease; border: none; cursor: pointer; } .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 234, 255, 0.4); } .status { margin-top: 24px; font-size: 0.85rem; color: #7a8ba0; } .online { color: #00ff99; } .offline { color: #ff0080; } </style>
</head>
<body> <div class="container"> <div class="icon">📡</div> <h1>Sin conexión</h1> <p>No hay conexión a Internet. Algunas funcionalidades pueden estar limitadas.</p> <button class="btn" onclick="location.reload()">Reintentar</button> <div class="status"> Estado: <span id="status" class="offline">Offline</span> </div> </div> <script> function updateStatus() { const status = document.getElementById('status'); if (navigator.onLine) { status.textContent = 'Online'; status.className = 'online'; } else { status.textContent = 'Offline'; status.className = 'offline'; } } window.addEventListener('online', () => { updateStatus(); setTimeout(() => location.reload(), 1000); }); window.addEventListener('offline', updateStatus); updateStatus(); </script>
</body>
</html>
