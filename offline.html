<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Sin conexion — Loventy</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #F8F5F0;
      color: #2C2C2C;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .wrap {
      max-width: 400px;
      text-align: center;
    }
    .logo {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.5rem;
      color: #5E7D60;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 2rem;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.75rem;
      color: #2C2C2C;
      margin-bottom: 1rem;
    }
    p {
      color: #6B6B6B;
      line-height: 1.7;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    button {
      padding: 0.75rem 2rem;
      background: #5E7D60;
      color: #FFFFFF;
      border: none;
      border-radius: 9999px;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
    }
    button:hover { background: #7C9A7E; }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="logo">Loventy</a>
    <h1>Sin conexion a internet</h1>
    <p>Comprueba tu conexion e intentalo de nuevo.</p>
    <button type="button" onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
